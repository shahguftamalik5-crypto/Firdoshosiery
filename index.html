<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">ShopZone</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <div class="cart">Cart (0)</div>
    </header>

    <section class="hero">
        <h1>Welcome to ShopZone</h1>
        <p>Find the best deals on your favorite products!</p>
    </section>

    <main>
        <h2>Featured Products</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product 1">
                <h3>Cool Tech Widget</h3>
                <p class="price">$19.99</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product 2">
                <h3>Classic Backpack</h3>
                <p class="price">$39.99</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product 3">
                <h3>Wireless Headphones</h3>
                <p class="price">$59.99</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product 4">
                <h3>Minimalist Watch</h3>
                <p class="price">$89.99</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 ShopZone. All rights reserved.</p>
    </footer>

</body>
</html>
