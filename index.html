<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firdos Hosiery — Admin Panel</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --panel-bg: #131924;
            --panel-border: #1e2638;
            --text-white: #ffffff;
            --text-grey: #8a99ad;
            --purple-neon: #7c4dff;
            --green-glow: #00e676;
            --red-glow: #ff1744;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            padding-bottom: 50px;
        }

        header {
            background-color: var(--panel-bg);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-box {
            background: linear-gradient(135deg, var(--purple-neon), #b388ff);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .brand-title {
            font-size: 16px;
            font-weight: 700;
        }
        .brand-sub {
            font-size: 11px;
            color: var(--text-grey);
            display: block;
        }

        .admin-status-btn {
            background: rgba(124, 77, 255, 0.1);
            border: 1px solid var(--purple-neon);
            color: #b388ff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .metric-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 16px;
        }
        .metric-title {
            font-size: 11px;
            color: var(--text-grey);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .metric-value {
            font-size: 22px;
            font-weight: 700;
        }

        .search-wrapper input {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 12px 16px;
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .filter-pill-box {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 25px;
            padding-bottom: 5px;
        }
        .pill-btn {
            background: var(--panel-bg);
            color: var(--text-grey);
            border: 1px solid var(--panel-border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .pill-btn.active {
            background: var(--purple-neon);
            color: white;
            border-color: var(--purple-neon);
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item-list-row {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .item-left-content {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .item-img-preview {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            object-fit: cover;
            background: #000;
        }

        .item-name-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-meta-tag {
            font-size: 11px;
            color: var(--text-grey);
        }

        .row-price-txt {
            font-size: 14px;
            font-weight: 700;
            color: var(--green-glow);
        }

        .row-delete-action {
            background: rgba(255, 23, 68, 0.1);
            border: none;
            color: var(--red-glow);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            display: none;
        }

        .floating-add-trigger {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--purple-neon);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            display: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4);
        }

        .custom-overlay-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 10, 0.85);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .modal-body-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 20px;
            border-radius: 14px;
            width: 100%;
            max-width: 360px;
            position: relative;
        }
        .modal-body-panel h3 {
            margin-bottom: 15px;
            font-size: 15px;
        }
        .modal-body-panel input, .modal-body-panel select {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--panel-border);
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            color: white;
            outline: none;
        }

        .dark-file-uploader {
            display: block;
            text-align: center;
            background: rgba(124, 77, 255, 0.05);
            padding: 12px;
            border: 1px dashed var(--panel-border);
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #b388ff;
            cursor: pointer;
        }

        .prime-action-btn {
            width: 100%;
            background: var(--purple-neon);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        .prime-action-btn:disabled { background: var(--panel-border); color: var(--text-grey); }

        .modal-dismiss {
            position: absolute; top: 15px; right: 15px; font-size: 18px; cursor: pointer; color: var(--text-grey);
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-box">F</div>
            <div>
                <span class="brand-title">Firdos Hosiery</span>
                <span class="brand-sub">Control Panel</span>
            </div>
        </div>
        <button class="admin-status-btn" id="adminLogBtn" onclick="triggerAdminAuth()">🔑 Login</button>
    </header>

    <div class="container">
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-title">Total Items</div>
                <div class="metric-value" id="countTotal">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Status</div>
                <div class="metric-value" id="countStock" style="color:var(--green-glow); font-size:16px; margin-top:5px;">● Connected</div>
            </div>
        </div>

        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Search catalog items..." onkeyup="renderProducts()">
        </div>

        <div class="filter-pill-box">
            <button class="pill-btn active" onclick="selectCategory('all', this)">All</button>
            <button class="pill-btn" onclick="selectCategory('tshirt', this)">T-Shirts</button>
            <button class="pill-btn" onclick="selectCategory('hoodie', this)">Hoodies</button>
            <button class="pill-btn" onclick="selectCategory('sweatshirt', this)">Sweatshirts</button>
            <button class="pill-btn" onclick="selectCategory('socks', this)">Socks</button>
        </div>

        <div class="list-container" id="productListGrid"></div>
    </div>

    <button class="floating-add-trigger" id="adminAddBtn" onclick="openModal('sellModal')">+</button>

    <div class="custom-overlay-modal" id="authModal">
        <div class="modal-body-panel">
            <span class="modal-dismiss" onclick="closeModal('authModal')">&times;</span>
            <h3>Store Admin Gateway</h3>
            <input type="email" id="authEmail" placeholder="Admin Email ID">
            <input type="password" id="authPass" placeholder="Security Password">
            <button class="prime-action-btn" onclick="verifyAdminSession()">Login</button>
        </div>
    </div>

    <div class="custom-overlay-modal" id="sellModal">
        <div class="modal-body-panel">
            <span class="modal-dismiss" onclick="closeModal('sellModal')">&times;</span>
            <h3>Upload New Design</h3>
            <input type="text" id="newTitle" placeholder="Product Title / Name" required>
            <input type="number" id="newPrice" placeholder="Selling Price (₹)" required>
            <select id="newCategory">
                <option value="tshirt">T-Shirts</option>
                <option value="hoodie">Hoodies</option>
                <option value="sweatshirt">Sweatshirts</option>
                <option value="socks">Socks</option>
            </select>
            
            <label class="dark-file-uploader" for="newImgFile" id="fileLabelText">📸 Select Image</label>
            <input type="file" id="newImgFile" accept="image/*" style="display: none;" onchange="updateFileName()">
            
            <button class="prime-action-btn" id="submitBtn" onclick="addNewProduct()">Upload to Cloud</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCWIR7IzPpla4DJj9GyOg7D-9vV_gXg8l8",
            authDomain: "firdos-hosiery.firebaseapp.com",
            projectId: "firdos-hosiery",
            storageBucket: "firdos-hosiery.appspot.com",
            messagingSenderId: "738069771751",
            appId: "1:738069771751:web:ab4c383e91129b05423fbe"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const storage = firebase.storage();

        const fallbackImg = "https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=100";
        let currentCategory = 'all';
        let firebaseProducts = [];

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        auth.onAuthStateChanged(user => {
            const addBtn = document.getElementById('adminAddBtn');
            const logBtn = document.getElementById('adminLogBtn');
            if (user) {
                logBtn.innerText = "🔒 Logout";
                addBtn.style.display = "flex";
                toggleDeleteButtons(true);
            } else {
                logBtn.innerText = "🔑 Login";
                addBtn.style.display = "none";
                toggleDeleteButtons(false);
            }
        });

        function triggerAdminAuth() {
            if(auth.currentUser) {
                auth.signOut().then(() => alert("Logged out safely."));
            } else {
                openModal('authModal');
            }
        }

        function verifyAdminSession() {
            let email = document.getElementById('authEmail').value;
            let pass = document.getElementById('authPass').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => closeModal('authModal'))
                .catch(err => alert("Error: " + err.message));
        }

        function updateFileName() {
            let fileInput = document.getElementById('newImgFile');
            let label = document.getElementById('fileLabelText');
            if(fileInput.files.length > 0) {
                label.innerText = "✅ " + fileInput.files[0].name;
            }
        }

        function listenToProducts() {
            db.collection("products").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
                firebaseProducts = [];
                snapshot.forEach((doc) => {
                    let data = doc.data();
                    data.id = doc.id;
                    firebaseProducts.push(data);
                });
                renderProducts();
            });
        }

        function renderProducts() {
            const listGrid = document.getElementById('productListGrid');
            listGrid.innerHTML = '';
            let searchText = document.getElementById('searchInput').value.toLowerCase();

            firebaseProducts.forEach(prod => {
                const matchesCategory = (currentCategory === 'all' || prod.category === currentCategory);
                const matchesSearch = prod.title.toLowerCase().includes(searchText);

                if (matchesCategory && matchesSearch) {
                    let row = document.createElement('div');
                    row.className = 'item-list-row';
                    row.innerHTML = `
                        <div class="item-left-content">
                            <img class="item-img-preview" src="${prod.img || fallbackImg}">
                            <div>
                                <div class="item-name-title">${prod.title}</div>
                                <div class="item-meta-tag">${prod.category.toUpperCase()}</div>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <span class="row-price-txt">₹${prod.price}</span>
                            <button class="row-delete-action" onclick="deleteProduct('${prod.id}', '${prod.storagePath || ''}')">&times;</button>
                        </div>
                    `;
                    listGrid.appendChild(row);
                }
            });

            document.getElementById('countTotal').innerText = firebaseProducts.length;
            if(auth.currentUser) toggleDeleteButtons(true);
        }

        function toggleDeleteButtons(show) {
            document.querySelectorAll('.row-delete-action').forEach(btn => {
                btn.style.display = show ? "block" : "none";
            });
        }

        function selectCategory(category, element) {
            currentCategory = category;
            document.querySelectorAll('.pill-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderProducts();
        }

        function addNewProduct() {
            let title = document.getElementById('newTitle').value;
            let price = document.getElementById('newPrice').value;
            let category = document.getElementById('newCategory').value;
            let fileInput = document.getElementById('newImgFile');
            let submitBtn = document.getElementById('submitBtn');

            if(!title || !price || fileInput.files.length === 0) { alert("Please fill all details and choose image."); return; }

            submitBtn.disabled = true;
            submitBtn.innerText = "Uploading Image to Storage...";

            let file = fileInput.files[0];
            let pathStr = 'product_images/' + Date.now() + '_' + file.name;
            let storageRef = storage.ref(pathStr);
            
            storageRef.put(file).then(snapshot => {
                return snapshot.ref.getDownloadURL();
            }).then(downloadURL => {
                submitBtn.innerText = "Syncing with Database...";
                return db.collection("products").add({
                    title: title, price: Number(price), category: category, img: downloadURL, storagePath: pathStr, createdAt: new Date()
                });
            }).then(() => {
                document.getElementById('newTitle').value = '';
                document.getElementById('newPrice').value = '';
                document.getElementById('newImgFile').value = '';
                document.getElementById('fileLabelText').innerText = "📸 Select Image";
                submitBtn.disabled = false; submitBtn.innerText = "Upload to Cloud";
                closeModal('sellModal');
                alert("Product Uploaded Successfully!");
            }).catch(err => {
                alert("Upload Failed: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Upload to Cloud";
            });
        }

        function deleteProduct(id, pathStr) {
            if(confirm("Delete this product?")) {
                db.collection("products").doc(id).delete().then(() => {
                    if(pathStr) storage.ref(pathStr).delete().catch(e => console.log("Storage clean skipped."));
                }).catch(err => alert("Error: " + err.message));
            }
        }

        window.onload = function() { listenToProducts(); };
    </script>
</body>
</html>
